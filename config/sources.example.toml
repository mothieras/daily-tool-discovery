# GitHub Search: topic-qualified + time-bounded for *fresh* discovery. `created:>DATE`
# surfaces new-but-already-validated repos; `pushed:>DATE` surfaces maintained ones.
# min_stars appends `stars:>=N` so brand-new junk never enters. Bump the dates
# periodically (or switch to dynamic windows — see plan follow-up).

[[github_search]]
name = "fresh-agent-tools"
query = "topic:mcp created:>2026-03-01"
kind = "agent-dev-tool"
per_page = 10
min_stars = 50

[[github_search]]
name = "maintained-agent-tools"
query = "topic:ai-agent pushed:>2026-04-01"
kind = "agent-dev-tool"
per_page = 10
min_stars = 100

[[github_search]]
name = "fresh-local-first-tools"
query = "topic:tauri created:>2026-01-01"
kind = "open-source-small-tool"
per_page = 10
min_stars = 30
